<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Enel × Blip — Denúncias Anônimas via WhatsApp</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Lexend:wght@300;400;500;600;700;800&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root{
  /* Blip palette */
  --blip-blue:#1968F0;
  --blip-blue-dark:#0C49B8;
  --blip-blue-deep:#072F73;
  --blip-blue-soft:#E8F0FE;
  --blip-ink:#0B0B25;

  /* Enel palette */
  --enel-red:#E1000F;
  --enel-red-dark:#A60008;
  --enel-violet:#B91D8E;

  /* WhatsApp */
  --wa-green:#075E54;
  --wa-green-light:#25D366;
  --wa-bubble-out:#D9FDD3;
  --wa-bubble-in:#FFFFFF;
  --wa-bg:#E5DDD5;
  --wa-bg-pattern:#ECE5DD;
  --wa-text:#111B21;
  --wa-text-muted:#667781;

  /* Neutrals */
  --bg:#F6F7FB;
  --surface:#FFFFFF;
  --border:#E6E8EF;
  --ink:#0B0B25;
  --ink-2:#3A3A55;
  --ink-3:#6B6B82;
  --shadow-sm: 0 1px 2px rgba(11,11,37,.06), 0 1px 3px rgba(11,11,37,.04);
  --shadow-md: 0 6px 24px rgba(11,11,37,.08), 0 2px 6px rgba(11,11,37,.04);
  --shadow-lg: 0 24px 60px rgba(11,11,37,.12), 0 4px 14px rgba(11,11,37,.06);
}

*{box-sizing:border-box;margin:0;padding:0}
html,body{font-family:'Lexend',sans-serif;background:var(--bg);color:var(--ink);-webkit-font-smoothing:antialiased;line-height:1.5}

/* ===== HEADER ===== */
.topbar{
  position:sticky;top:0;z-index:50;
  background:rgba(255,255,255,.85);
  backdrop-filter:blur(14px);
  -webkit-backdrop-filter:blur(14px);
  border-bottom:1px solid var(--border);
}
.topbar-inner{
  max-width:1320px;margin:0 auto;padding:14px 28px;
  display:flex;align-items:center;justify-content:space-between;gap:24px;
}
.brand{display:flex;align-items:center;gap:14px}
.brand-mark{
  width:42px;height:42px;border-radius:11px;
  background:linear-gradient(135deg,var(--blip-blue) 0%,var(--blip-blue-dark) 100%);
  display:grid;place-items:center;color:#fff;font-weight:700;font-size:18px;
  box-shadow:0 6px 16px rgba(25,104,240,.35);
}
.brand-x{color:var(--ink-3);font-weight:300;font-size:18px}
.brand-mark.enel{
  background:linear-gradient(135deg,var(--enel-red) 0%,var(--enel-red-dark) 100%);
  box-shadow:0 6px 16px rgba(225,0,15,.35);
}
.brand-text{display:flex;flex-direction:column;line-height:1.15}
.brand-text strong{font-size:14px;letter-spacing:.02em}
.brand-text span{font-size:11px;color:var(--ink-3);text-transform:uppercase;letter-spacing:.12em}

.topbar-meta{display:flex;align-items:center;gap:18px;font-size:12px;color:var(--ink-3)}
.dot-live{display:inline-flex;align-items:center;gap:6px;padding:5px 10px;border-radius:99px;background:#E8FFEF;color:#0F9D58;font-weight:500}
.dot-live::before{content:"";width:6px;height:6px;border-radius:50%;background:#0F9D58;box-shadow:0 0 0 0 rgba(15,157,88,.5);animation:pulse 2s infinite}
@keyframes pulse{0%{box-shadow:0 0 0 0 rgba(15,157,88,.5)}70%{box-shadow:0 0 0 8px rgba(15,157,88,0)}100%{box-shadow:0 0 0 0 rgba(15,157,88,0)}}

/* ===== TABS ===== */
.tabs-wrap{
  max-width:1320px;margin:0 auto;padding:24px 28px 0;
}
.tabs{
  display:inline-flex;gap:4px;padding:5px;background:var(--surface);
  border:1px solid var(--border);border-radius:14px;box-shadow:var(--shadow-sm);
}
.tab-btn{
  border:0;background:transparent;cursor:pointer;
  padding:10px 20px;border-radius:10px;font-family:inherit;font-size:14px;font-weight:500;color:var(--ink-2);
  display:inline-flex;align-items:center;gap:9px;transition:all .2s ease;
}
.tab-btn:hover{color:var(--ink)}
.tab-btn.active{background:var(--blip-ink);color:#fff;box-shadow:0 4px 12px rgba(11,11,37,.18)}
.tab-btn .tab-num{
  font-family:'JetBrains Mono',monospace;font-size:11px;
  background:rgba(255,255,255,.18);padding:2px 7px;border-radius:5px;
}
.tab-btn:not(.active) .tab-num{background:#F0F1F6;color:var(--ink-3)}

/* ===== PANELS ===== */
.panel{display:none;max-width:1320px;margin:0 auto;padding:28px}
.panel.active{display:block;animation:fadeIn .35s ease}
@keyframes fadeIn{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:none}}

/* ===== TAB 1 — PROJETO ===== */
.hero{
  position:relative;overflow:hidden;border-radius:24px;padding:54px 56px;
  background:radial-gradient(140% 100% at 0% 0%,#0C49B8 0%,#072F73 60%,#040C24 100%);
  color:#fff;box-shadow:var(--shadow-lg);
}
.hero::before{
  content:"";position:absolute;inset:0;
  background:
    radial-gradient(60% 40% at 90% 110%,rgba(225,0,15,.45) 0%,transparent 60%),
    radial-gradient(40% 30% at 100% 0%,rgba(25,104,240,.6) 0%,transparent 60%);
  pointer-events:none;
}
.hero::after{
  content:"";position:absolute;inset:0;opacity:.08;
  background-image:
    linear-gradient(to right,rgba(255,255,255,.6) 1px,transparent 1px),
    linear-gradient(to bottom,rgba(255,255,255,.6) 1px,transparent 1px);
  background-size:48px 48px;
  mask-image:linear-gradient(to bottom right,#000 0%,transparent 80%);
  pointer-events:none;
}
.hero-inner{position:relative;z-index:1;display:grid;grid-template-columns:1.4fr 1fr;gap:40px;align-items:center}
.hero-tag{
  display:inline-flex;align-items:center;gap:8px;
  padding:6px 12px;border-radius:99px;
  background:rgba(255,255,255,.1);border:1px solid rgba(255,255,255,.18);
  font-size:11px;letter-spacing:.18em;text-transform:uppercase;font-weight:500;
}
.hero-tag .tag-dot{width:6px;height:6px;border-radius:50%;background:var(--enel-red)}
.hero h1{
  font-size:54px;line-height:1.05;font-weight:700;letter-spacing:-.02em;
  margin:18px 0 16px;
}
.hero h1 em{font-style:normal;background:linear-gradient(90deg,#FFB3B8 0%,#FF5C68 100%);-webkit-background-clip:text;background-clip:text;color:transparent}
.hero p{font-size:16px;line-height:1.6;color:rgba(255,255,255,.78);max-width:520px}
.hero-side{
  background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.12);
  border-radius:18px;padding:24px;backdrop-filter:blur(8px);
}
.hero-side h4{font-size:11px;letter-spacing:.16em;text-transform:uppercase;color:rgba(255,255,255,.5);margin-bottom:14px;font-weight:500}
.hero-side ul{list-style:none;display:flex;flex-direction:column;gap:11px}
.hero-side li{font-size:13px;color:rgba(255,255,255,.88);display:flex;gap:10px;align-items:flex-start;line-height:1.45}
.hero-side li::before{
  content:"";width:14px;height:14px;border-radius:4px;
  background:linear-gradient(135deg,var(--blip-blue),var(--enel-red));
  flex-shrink:0;margin-top:3px;
}

/* ===== Section base ===== */
.section{margin-top:48px}
.section-head{display:flex;align-items:flex-end;justify-content:space-between;gap:24px;margin-bottom:22px;flex-wrap:wrap}
.section-title{display:flex;flex-direction:column;gap:6px}
.section-eyebrow{font-size:11px;letter-spacing:.18em;text-transform:uppercase;color:var(--blip-blue);font-weight:600;display:flex;align-items:center;gap:8px}
.section-eyebrow::before{content:"";width:24px;height:1px;background:var(--blip-blue)}
.section-title h2{font-size:32px;font-weight:700;letter-spacing:-.015em;line-height:1.15}
.section-desc{font-size:14px;color:var(--ink-3);max-width:480px;line-height:1.55}

/* ===== KPIs grid ===== */
.kpi-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:14px}
.kpi-card{
  background:var(--surface);border:1px solid var(--border);
  border-radius:16px;padding:22px;position:relative;overflow:hidden;
  transition:transform .25s ease,box-shadow .25s ease;
}
.kpi-card:hover{transform:translateY(-2px);box-shadow:var(--shadow-md)}
.kpi-card.accent-blip{border-top:3px solid var(--blip-blue)}
.kpi-card.accent-enel{border-top:3px solid var(--enel-red)}
.kpi-card.accent-green{border-top:3px solid #0F9D58}
.kpi-card.accent-amber{border-top:3px solid #F4B400}
.kpi-label{font-size:11px;letter-spacing:.14em;text-transform:uppercase;color:var(--ink-3);font-weight:600;margin-bottom:14px}
.kpi-value{font-size:42px;font-weight:700;letter-spacing:-.02em;line-height:1;display:flex;align-items:baseline;gap:6px}
.kpi-value .unit{font-size:18px;font-weight:500;color:var(--ink-3)}
.kpi-sub{font-size:12px;color:var(--ink-3);margin-top:10px;line-height:1.45}
.kpi-trend{
  display:inline-flex;align-items:center;gap:4px;
  font-size:11px;font-weight:600;color:#0F9D58;
  padding:3px 7px;border-radius:6px;background:#E8FFEF;margin-top:12px;
}
.kpi-card .kpi-bg{
  position:absolute;right:-30px;bottom:-30px;width:140px;height:140px;
  border-radius:50%;background:radial-gradient(circle,currentColor,transparent 70%);
  opacity:.05;pointer-events:none;
}

/* ===== Two col layout ===== */
.split{display:grid;grid-template-columns:1.1fr 1fr;gap:24px}
.card{
  background:var(--surface);border:1px solid var(--border);
  border-radius:18px;padding:28px;box-shadow:var(--shadow-sm);
}
.card h3{font-size:18px;font-weight:600;margin-bottom:6px;letter-spacing:-.01em}
.card .card-eyebrow{font-size:11px;letter-spacing:.16em;text-transform:uppercase;color:var(--ink-3);font-weight:600;margin-bottom:6px}
.card p{font-size:14px;color:var(--ink-2);line-height:1.6;margin-bottom:14px}
.bullet-list{list-style:none;display:flex;flex-direction:column;gap:12px;margin-top:14px}
.bullet-list li{display:flex;gap:12px;align-items:flex-start;font-size:14px;color:var(--ink-2);line-height:1.55}
.bullet-list li .bl-num{
  flex-shrink:0;width:22px;height:22px;border-radius:6px;
  background:var(--blip-blue-soft);color:var(--blip-blue);
  display:grid;place-items:center;font-size:11px;font-weight:700;
  font-family:'JetBrains Mono',monospace;margin-top:1px;
}
.bullet-list li strong{color:var(--ink);font-weight:600}

/* ===== Quick wins ===== */
.qw-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:14px}
.qw-card{
  background:var(--surface);border:1px solid var(--border);
  border-radius:14px;padding:22px;position:relative;
  transition:all .25s ease;
}
.qw-card:hover{transform:translateY(-2px);box-shadow:var(--shadow-md);border-color:var(--blip-blue)}
.qw-icon{
  width:38px;height:38px;border-radius:10px;
  display:grid;place-items:center;margin-bottom:14px;
  background:var(--blip-blue-soft);color:var(--blip-blue);
}
.qw-card h4{font-size:15px;font-weight:600;margin-bottom:6px}
.qw-card p{font-size:13px;color:var(--ink-3);line-height:1.5}
.qw-tag{
  position:absolute;top:14px;right:14px;
  font-size:10px;letter-spacing:.1em;text-transform:uppercase;font-weight:600;
  padding:3px 8px;border-radius:99px;
}
.qw-tag.fast{background:#E8FFEF;color:#0F9D58}
.qw-tag.med{background:#FFF4DA;color:#B7791F}

/* ===== Pillars ===== */
.pillars{display:grid;grid-template-columns:repeat(4,1fr);gap:14px}
.pillar{
  background:var(--surface);border:1px solid var(--border);border-radius:14px;
  padding:22px;position:relative;overflow:hidden;
}
.pillar::before{
  content:attr(data-num);
  position:absolute;right:-8px;top:-22px;
  font-size:90px;font-weight:800;color:var(--bg);
  font-family:'JetBrains Mono',monospace;line-height:1;
  z-index:0;
}
.pillar > *{position:relative;z-index:1}
.pillar h4{font-size:15px;font-weight:600;margin-bottom:10px;letter-spacing:-.005em}
.pillar p{font-size:13px;color:var(--ink-3);line-height:1.5}

/* ===== Stage table ===== */
.stages{
  background:var(--surface);border:1px solid var(--border);border-radius:18px;overflow:hidden;
}
.stage-row{
  display:grid;grid-template-columns:60px 1fr 1.2fr 220px;
  gap:24px;align-items:center;padding:20px 24px;
  border-bottom:1px solid var(--border);
}
.stage-row:last-child{border-bottom:0}
.stage-row.head{background:#FAFAFC;font-size:11px;letter-spacing:.14em;text-transform:uppercase;color:var(--ink-3);font-weight:600;padding:12px 24px}
.stage-num{
  width:36px;height:36px;border-radius:50%;
  background:linear-gradient(135deg,var(--blip-blue),var(--blip-blue-dark));
  color:#fff;display:grid;place-items:center;font-weight:700;font-size:13px;
  font-family:'JetBrains Mono',monospace;
}
.stage-name{font-weight:600;font-size:14px;color:var(--ink)}
.stage-name span{display:block;font-size:11px;font-weight:500;color:var(--ink-3);margin-top:2px;letter-spacing:.06em;text-transform:uppercase}
.stage-desc{font-size:13px;color:var(--ink-2);line-height:1.5}
.stage-tools{display:flex;flex-wrap:wrap;gap:5px}
.stage-tag{
  font-size:11px;padding:4px 9px;border-radius:99px;
  background:#F0F1F6;color:var(--ink-2);font-weight:500;
  font-family:'JetBrains Mono',monospace;
}

/* ===== TAB 2 — JOURNEYS ===== */
.journey-nav{
  display:flex;flex-wrap:wrap;gap:8px;margin-bottom:28px;
  background:var(--surface);padding:8px;border-radius:14px;border:1px solid var(--border);
}
.j-btn{
  border:0;background:transparent;cursor:pointer;font-family:inherit;
  padding:9px 16px;border-radius:9px;font-size:13px;font-weight:500;color:var(--ink-2);
  display:inline-flex;align-items:center;gap:8px;transition:all .2s ease;
}
.j-btn:hover{background:#F4F5F9;color:var(--ink)}
.j-btn.active{background:var(--blip-ink);color:#fff}
.j-btn .j-num{
  font-family:'JetBrains Mono',monospace;font-size:10px;font-weight:600;
  width:18px;height:18px;border-radius:5px;display:grid;place-items:center;
  background:rgba(255,255,255,.18);
}
.j-btn:not(.active) .j-num{background:#E6E8EF;color:var(--ink-3)}

.journey-stage{display:none}
.journey-stage.active{display:block;animation:fadeIn .35s ease}

.journey-header{
  display:grid;grid-template-columns:1fr 280px;gap:30px;
  margin-bottom:28px;align-items:end;
}
.journey-h-left h2{font-size:30px;font-weight:700;letter-spacing:-.015em;line-height:1.1;margin-bottom:12px}
.journey-h-left h2 .j-eyebrow{
  display:block;font-size:12px;letter-spacing:.18em;text-transform:uppercase;
  color:var(--enel-red);font-weight:600;margin-bottom:8px;
}
.journey-h-left p{font-size:14px;color:var(--ink-3);line-height:1.6;max-width:560px}
.journey-h-right{
  background:linear-gradient(135deg,#FFEFEF 0%,#FFF8F8 100%);
  border:1px solid #FBD9D9;border-radius:14px;padding:18px;
}
.journey-h-right h5{font-size:11px;letter-spacing:.14em;text-transform:uppercase;color:var(--enel-red);font-weight:600;margin-bottom:8px}
.journey-h-right p{font-size:12px;color:var(--ink-2);line-height:1.5}

/* Phone mockup grid */
.phones{
  display:flex;gap:24px;overflow-x:auto;padding:8px 4px 32px;
  scroll-snap-type:x mandatory;
  scrollbar-width:thin;
}
.phones::-webkit-scrollbar{height:8px}
.phones::-webkit-scrollbar-track{background:transparent}
.phones::-webkit-scrollbar-thumb{background:#D1D4DD;border-radius:4px}

.phone-frame{
  flex-shrink:0;width:300px;scroll-snap-align:start;
  display:flex;flex-direction:column;
}
.phone-step{
  font-size:11px;letter-spacing:.14em;text-transform:uppercase;
  color:var(--ink-3);font-weight:600;margin-bottom:10px;
  display:flex;align-items:center;gap:8px;
}
.phone-step .step-num{
  width:22px;height:22px;border-radius:6px;
  background:var(--blip-ink);color:#fff;
  display:grid;place-items:center;font-size:10px;font-weight:700;
  font-family:'JetBrains Mono',monospace;
}
.phone-caption{
  font-size:13px;color:var(--ink);line-height:1.45;font-weight:500;margin-bottom:14px;
}
.phone{
  width:300px;height:608px;
  background:#0B0B25;
  border-radius:38px;padding:10px;
  box-shadow:0 24px 60px rgba(11,11,37,.18),0 6px 18px rgba(11,11,37,.1),inset 0 0 0 1px #2a2a3f;
  position:relative;
}
.phone::before{
  content:"";position:absolute;top:14px;left:50%;transform:translateX(-50%);
  width:90px;height:22px;background:#0B0B25;border-radius:14px;z-index:5;
}
.phone-screen{
  width:100%;height:100%;border-radius:30px;overflow:hidden;
  display:flex;flex-direction:column;background:#ECE5DD;
  position:relative;
}
.phone-status{
  background:var(--wa-green);color:#fff;padding:30px 14px 6px;
  display:flex;justify-content:space-between;font-size:10px;
  font-family:'JetBrains Mono',monospace;align-items:flex-end;
}
.phone-status .time{font-weight:600}
.phone-status .icons{display:flex;gap:5px;align-items:center;font-size:9px}

.wa-header{
  background:var(--wa-green);color:#fff;padding:6px 12px 10px;
  display:flex;align-items:center;gap:10px;
}
.wa-back{font-size:18px;line-height:1;cursor:default}
.wa-avatar{
  width:36px;height:36px;border-radius:50%;
  background:linear-gradient(135deg,var(--enel-red),var(--enel-red-dark));
  display:grid;place-items:center;font-weight:700;font-size:13px;color:#fff;
  position:relative;flex-shrink:0;
}
.wa-avatar::after{
  content:"";position:absolute;right:-2px;bottom:-2px;
  width:11px;height:11px;border-radius:50%;
  background:#25D366;border:2px solid var(--wa-green);
}
.wa-name{display:flex;flex-direction:column;line-height:1.2;flex:1;min-width:0}
.wa-name strong{font-size:13.5px;font-weight:600}
.wa-name span{font-size:10.5px;color:rgba(255,255,255,.78);display:flex;align-items:center;gap:4px}
.wa-name span::before{content:"●";color:#7DEFA1;font-size:7px}
.wa-actions{display:flex;gap:14px;color:rgba(255,255,255,.85);font-size:14px}
.wa-actions svg{width:16px;height:16px}

/* Chat bodyDenúncia anônima, conduzida por IA dentro do WhatsApp.
